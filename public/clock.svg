  <text x="148" y="42" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">1</text>
  <text x="176" y="72" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">2</text>
  <text x="184" y="114" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">3</text>
  <text x="176" y="156" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">4</text>
  <text x="148" y="184" text-anchor="middle" font-size="11" font-family="Arial" fill="#333">5</text>
